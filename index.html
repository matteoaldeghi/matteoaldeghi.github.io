<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matteo Aldeghi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html, body {
      margin: 0; padding: 0;
      min-height: 100%; width: 100%;
      background: #fafaf9;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { width: 100%; min-height: 100vh; }

    /* Smooth scrolling for in-page anchors */
    html { scroll-behavior: smooth; }

    /* Page transition: subtle fade + slight lift */
    .page-fade {
      animation: pageFade 360ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes pageFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stagger child reveals inside a freshly mounted page */
    .page-fade > * > section,
    .page-fade > * > header {
      animation: sectionReveal 500ms cubic-bezier(0.22, 0.61, 0.36, 1) backwards;
    }
    .page-fade > * > header { animation-delay: 40ms; }
    .page-fade > * > section:nth-child(2) { animation-delay: 120ms; }
    .page-fade > * > section:nth-child(3) { animation-delay: 180ms; }
    .page-fade > * > section:nth-child(4) { animation-delay: 240ms; }
    .page-fade > * > section:nth-child(5) { animation-delay: 300ms; }
    @keyframes sectionReveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Author highlight */
    .dir-c-me {
      color: var(--c-accent, #2548f0);
      font-weight: 600;
      text-decoration: underline;
      text-decoration-color: var(--c-accent, #2548f0);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    /* Subtle scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 5px; border: 2px solid #fafaf9; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

    a { color: inherit; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .page-fade,
      .page-fade > * > section,
      .page-fade > * > header { animation: none; }
      html { scroll-behavior: auto; }
    }

    /* ── Mobile (≤768px) ───────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Tighter horizontal padding throughout */
      .c-page > section,
      .c-page > footer,
      .c-page > header,
      .c-section,
      .c-footer { padding-left: 20px !important; padding-right: 20px !important; }
      .c-section-hero { padding-top: 40px !important; padding-bottom: 32px !important; }
      .c-section-featured { padding-top: 56px !important; padding-bottom: 24px !important; }
      .c-section-affil { padding-top: 24px !important; padding-bottom: 24px !important; }

      /* Nav: shrink, tighter pills */
      .c-nav { padding: 14px 20px !important; gap: 12px !important; flex-wrap: wrap !important; }
      .c-nav > a span { font-size: 15px !important; }
      .c-nav nav { gap: 2px !important; }
      .c-nav nav a { padding: 6px 10px !important; font-size: 13px !important; }

      /* Big titles smaller */
      .c-h1 { font-size: 40px !important; line-height: 1.05 !important; margin-bottom: 20px !important; }
      .c-h1 > span > span[style*="0.82em"] { font-size: 0.78em !important; }

      /* Hero grid → single column, info card on top */
      .c-hero-grid {
        grid-template-columns: 1fr !important;
        gap: 28px !important;
        align-items: stretch !important;
      }
      .c-hero-grid > div:first-child p { font-size: 16px !important; }

      /* Info card: shrink */
      .c-info-card { padding: 18px !important; }
      .c-info-card-head img { width: 56px !important; height: 56px !important; border-radius: 14px !important; }

      /* Affiliations strip: wrap with smaller items */
      .c-affil-row {
        flex-wrap: wrap !important;
        gap: 10px 20px !important;
        justify-content: flex-start !important;
      }
      .c-affil-row > span { font-size: 14px !important; }

      /* Featured publications: stack header, single-column grid */
      .c-feat-head {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 16px !important;
        margin-bottom: 24px !important;
      }
      .c-feat-head h2 { font-size: 26px !important; }
      .c-feat-grid { grid-template-columns: 1fr !important; }

      /* Footer: stack columns, stack bottom row */
      .c-footer-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
      .c-footer-bottom { flex-direction: column !important; gap: 8px !important; align-items: flex-start !important; }

      /* Résumé experience card → stack */
      .c-resume-card {
        grid-template-columns: 1fr !important;
        gap: 14px !important;
        align-items: start !important;
        padding: 18px !important;
      }
      .c-resume-card > div:last-child { text-align: left !important; }

      /* Résumé education: single column */
      .c-edu-grid { grid-template-columns: 1fr !important; }

      /* Publications controls: stack search & filters */
      .c-pub-controls {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 8px !important;
      }
      .c-pub-filters {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
        max-width: 100% !important;
      }
      .c-pub-filters button { flex-shrink: 0 !important; white-space: nowrap; }

      /* Publications row → stack */
      .c-pub-row {
        grid-template-columns: 1fr !important;
        gap: 10px !important;
        padding: 16px !important;
      }
      .c-pub-row > div:last-child { text-align: left !important; }
      .c-pub-row > div:first-child { display: flex; align-items: baseline; gap: 12px; }
    }

    /* ── Very small (≤480px) ───────────────────────────────────── */
    @media (max-width: 480px) {
      .c-h1 { font-size: 34px !important; }
      .c-nav { padding: 12px 16px !important; }
      .c-page > section, .c-section, .c-footer { padding-left: 16px !important; padding-right: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="direction-c.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
