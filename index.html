<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matteo Aldeghi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html, body {
      margin: 0; padding: 0;
      min-height: 100%; width: 100%;
      background: #fafaf9;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { width: 100%; min-height: 100vh; }

    /* Smooth scrolling for in-page anchors */
    html { scroll-behavior: smooth; }

    /* Page transition: subtle fade + slight lift */
    .page-fade {
      animation: pageFade 360ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes pageFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stagger child reveals inside a freshly mounted page */
    .page-fade > * > section,
    .page-fade > * > header {
      animation: sectionReveal 500ms cubic-bezier(0.22, 0.61, 0.36, 1) backwards;
    }
    .page-fade > * > header { animation-delay: 40ms; }
    .page-fade > * > section:nth-child(2) { animation-delay: 120ms; }
    .page-fade > * > section:nth-child(3) { animation-delay: 180ms; }
    .page-fade > * > section:nth-child(4) { animation-delay: 240ms; }
    .page-fade > * > section:nth-child(5) { animation-delay: 300ms; }
    @keyframes sectionReveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Author highlight */
    .dir-c-me {
      color: var(--c-accent, #2548f0);
      font-weight: 600;
      text-decoration: underline;
      text-decoration-color: var(--c-accent, #2548f0);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    /* Subtle scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 5px; border: 2px solid #fafaf9; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

    a { color: inherit; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .page-fade,
      .page-fade > * > section,
      .page-fade > * > header { animation: none; }
      html { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="direction-c.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
